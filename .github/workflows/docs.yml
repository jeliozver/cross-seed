name: docs

on:
    push:
        branches:
            - "**"
        paths:
            - "cross-seed.org/**"
            - ".github/workflows/docs.yml"
    pull_request:
        branches:
            - "master"
        paths:
            - "cross-seed.org/**"
            - ".github/workflows/docs.yml"
    workflow_dispatch:

jobs:
    docs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
              with:
                  node-version: 26
                  cache: npm
            - run: npm ci
            - run: npm -w cross-seed.org run lint
            - run: npm -w cross-seed.org run build
